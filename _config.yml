remote_theme: "keikai/minimal-mistakes@zk"
repository: keikai/minimal-mistakes
# Ensure consistent date handling during builds
timezone: Asia/Taipei
# theme: "minimal-mistakes-jekyll" # use local theme
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache  #required by minimal-mistakes
  - jekyll-paginate
  - jekyll-redirect-from

  #- jekyll-sitemap #disabled to use custom sitemap.xml template

minimal_mistakes_skin: "zk"
name: "Potix Corporation"
title: "ZK Documentation"
description: "Official ZK Framework documentation: getting started guides, developer reference, MVVM, configuration, and the complete component reference."
logo: /assets/images/ZK-logo.svg
og_image: /assets/images/zklogo.png
# Drives the JSON-LD structured data block in seo.html (Organization, not Person)
social:
  type: Organization
  name: "Potix Corporation"
  links:
    - "https://docs.zkoss.org/"

search                    : true
search_full_content       : true
#  Lunr search only indexes collection documents e.g. posts by default, so we need to enable search_within_pages for all pages
lunr:
    search_within_pages: true
search_provider: lunr
#google:
#  search_engine_id: a4a9ff8c389a44148
# check page indexing at https://search.google.com/search-console

#loadga4 declared in minimal-mistakes
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-57B6X16TY1"
    policy_url: "https://www.zkoss.org/privacy"

defaults:
  - scope:
      path: ""
    values:
      layout: single
      toc: true
      comments: true
      share: true
  - scope:
      path: "get_started"
    values:
      description: "Get started with ZK: quick-start tutorials and your first ZK web application in Java."
      sidebar:
        nav: "get_started"
  - scope:
      path: "zats_essentials"
    values:
      description: "ZATS Essentials: unit and integration testing for ZK applications with the ZK Application Test Suite."
      sidebar:
        nav: "zats_essentials"
  - scope:
      path: "zk_calendar_essentials"
    values:
      description: "ZK Calendar Essentials: build interactive calendar and scheduling UIs with the ZK Calendar component."
      sidebar:
        nav: "zk_calendar_essentials"
  - scope:
      path: "zk_charts_essentials"
    values:
      description: "ZK Charts Essentials: create interactive charts and data visualizations in ZK applications."
      sidebar:
        nav: "zk_charts_essentials"
  - scope:
      path: "zk_client_side_ref"
    values:
      description: "ZK Client-side Reference: JavaScript widgets, client-side programming, and customization for ZK."
      sidebar:
        nav: "zk_client_side_ref"
  - scope:
      path: "zk_component_dev_essentials"
    values:
      description: "ZK Component Development Essentials: build custom ZK components and widgets from scratch."
      sidebar:
        nav: "zk_component_dev_essentials"
  - scope:
      path: "zk_component_ref"
    values:
      description: "ZK Component Reference: API, attributes, events, and live examples for every ZK UI component."
      sidebar:
        nav: "zk_component_ref"
  - scope:
      path: "zk_config_ref"
    values:
      description: "ZK Configuration Reference: zk.xml, web.xml, and library properties for configuring ZK applications."
      sidebar:
        nav: "zk_config_ref"
  - scope:
      path: "zk_dev_ref"
    values:
      description: "ZK Developer's Reference: in-depth guide to ZK architecture, UI composing, event handling, and advanced features."
      sidebar:
        nav: "zk_dev_ref"
  - scope:
      path: "zk_essentials"
    values:
      description: "ZK Essentials: core concepts and fundamentals for building web applications with ZK."
      sidebar:
        nav: "zk_essentials"
  - scope:
      path: "zk_installation_guide"
    values:
      description: "ZK Installation Guide: set up ZK in your project with Maven, Gradle, or manual installation."
      sidebar:
        nav: "zk_installation_guide"
  - scope:
      path: "zk_jsp_tags_essentials"
    values:
      description: "ZK JSP Tags Essentials: integrate ZK components into JSP pages using ZK JSP tags."
      sidebar:
        nav: "zk_jsp_tags_essentials"
  - scope:
      path: "zk_mvvm_ref"
    values:
      description: "ZK MVVM Reference: data binding, commands, and the Model-View-ViewModel pattern in ZK."
      sidebar:
        nav: "zk_mvvm_ref"
  - scope:
      path: "zk_pivottable_essentials"
    values:
        description: "ZK Pivottable Essentials: build interactive pivot tables for data analysis in ZK."
        sidebar:
            nav: "zk_pivottable_essentials"
  - scope:
      path: "zk_spring_essentials"
    values:
      description: "ZK Spring Essentials: integrate ZK with the Spring Framework and Spring Boot."
      sidebar:
        nav: "zk_spring_essentials"
  - scope:
      path: "zk_studio_essentials"
    values:
      description: "ZK Studio Essentials: develop ZK applications with the ZK Studio Eclipse plugin."
      sidebar:
        nav: "zk_studio_essentials"
  - scope:
      path: "zk_style_customization_guide"
    values:
      description: "ZK Style Customization Guide: theme, skin, and CSS customization for ZK applications."
      sidebar:
        nav: "zk_style_customization_guide"
  - scope:
      path: "zuml_ref"
    values:
      description: "ZUML Reference: the ZK User Interface Markup Language for declaring UIs in XML."
      sidebar:
        nav: "zuml_ref"
  - scope:
      path: "zk_webdriver"
    values:
      description: "ZK WebDriver: end-to-end testing of ZK applications with Selenium WebDriver."
      sidebar:
        nav: "zk_webdriver"
  - scope:
     path: "_posts"
    values:
      description: "ZK Small Talks: technical articles, release notes, and feature deep-dives from ZK developers."
      sidebar:
        nav: "small_talk"
  - scope:
      path: "eval_guide"
    values:
      description: "ZK Evaluation Guide: explore ZK's features and capabilities to evaluate it for your project."
      sidebar:
        nav: "eval_guide"

category_archive:
  type: liquid
  path: /categories/

atom_feed:
  hide: true
# disqus admin is hawkchen@potix.com

exclude:
  - tool/
  - "*.iml"
  - "*.code-workspace"
  - "README.md"
  - "CLAUDE.md"
  - "*.sh"
  - tasks
  - .venv
  - .claude
  - .github

include:
  - "_pages"
