<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 528" width="100%" style="max-width:780px;display:block">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60A5FA"/>
    </marker>
    <filter id="card-shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.07"/>
    </filter>
  </defs>

  <style>
    text {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }
  </style>

  <!-- ═══════════════ LEFT CLUSTER: Swing (Before) ═══════════════ -->
  <rect x="10" y="10" width="345" height="492" rx="14" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- cluster header pill -->
  <rect x="68" y="22" width="208" height="28" rx="14" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="172" y="40" text-anchor="middle" font-size="12" font-weight="600" fill="#475569" letter-spacing="0.3">Swing  (Before)</text>

  <!-- ═══════════════ RIGHT CLUSTER: ZK (After) ═══════════════ -->
  <rect x="425" y="10" width="345" height="492" rx="14" fill="#F0F7FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <!-- cluster header pill -->
  <rect x="483" y="22" width="208" height="28" rx="14" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="597" y="40" text-anchor="middle" font-size="12" font-weight="600" fill="#1D4ED8" letter-spacing="0.3">ZK  (After)</text>

  <!-- ═══════════════ MIGRATION ARROW (middle, Presentation row) ═══════════════ -->
  <line x1="362" y1="133" x2="418" y2="133" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-blue)"/>
  <text x="390" y="124" text-anchor="middle" font-size="10" fill="#93C5FD" font-weight="500" letter-spacing="0.3">migrate</text>

  <!-- ═══════════════════════════════════════════════════════
       LEFT: PRESENTATION BOX
  ═══════════════════════════════════════════════════════ -->
  <rect x="28" y="60" width="309" height="148" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5" filter="url(#card-shadow)"/>
  <!-- title row -->
  <text x="172" y="82" text-anchor="middle" font-size="11.5" font-weight="700" fill="#DC2626" letter-spacing="1">PRESENTATION</text>
  <line x1="38" y1="90" x2="328" y2="90" stroke="#FECACA" stroke-width="1"/>
  <!-- content -->
  <text x="172" y="109" text-anchor="middle" font-size="11.5" fill="#78716C">ContactManagerFrame</text>
  <text x="172" y="126" text-anchor="middle" font-size="11.5" fill="#78716C">ContactTableModel</text>
  <text x="172" y="143" text-anchor="middle" font-size="11.5" fill="#78716C">ContactDetailPanel</text>
  <text x="172" y="160" text-anchor="middle" font-size="11.5" fill="#78716C">ContactDialog</text>
  <!-- badge -->
  <rect x="76" y="170" width="192" height="22" rx="11" fill="#FECACA"/>
  <text x="172" y="184" text-anchor="middle" font-size="10" fill="#DC2626" font-weight="600">↻  Replaced in ZK migration</text>

  <!-- Arrow L: Pres → Domain -->
  <line x1="172" y1="208" x2="172" y2="250" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════
       LEFT: DOMAIN BOX
  ═══════════════════════════════════════════════════════ -->
  <rect x="40" y="254" width="266" height="82" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="172" y="275" text-anchor="middle" font-size="11.5" font-weight="700" fill="#16A34A" letter-spacing="1">DOMAIN</text>
  <line x1="50" y1="283" x2="296" y2="283" stroke="#BBF7D0" stroke-width="1"/>
  <text x="172" y="303" text-anchor="middle" font-size="11.5" fill="#78716C">Contact, Category</text>
  <text x="172" y="321" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="600">✓  Preserved intact</text>

  <!-- Arrow L: Domain → Data Source -->
  <line x1="172" y1="336" x2="172" y2="378" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════
       LEFT: DATA SOURCE BOX
  ═══════════════════════════════════════════════════════ -->
  <rect x="32" y="382" width="282" height="82" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="172" y="403" text-anchor="middle" font-size="11.5" font-weight="700" fill="#16A34A" letter-spacing="1">DATA SOURCE</text>
  <line x1="42" y1="411" x2="304" y2="411" stroke="#BBF7D0" stroke-width="1"/>
  <text x="172" y="430" text-anchor="middle" font-size="11.5" fill="#78716C">ContactStore (singleton)</text>
  <text x="172" y="448" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="600">✓  Preserved intact</text>

  <!-- ═══════════════════════════════════════════════════════
       RIGHT: PRESENTATION BOX
  ═══════════════════════════════════════════════════════ -->
  <rect x="443" y="60" width="309" height="148" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2" filter="url(#card-shadow)"/>
  <!-- title row -->
  <text x="597" y="82" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1D4ED8" letter-spacing="1">PRESENTATION</text>
  <line x1="453" y1="90" x2="743" y2="90" stroke="#BFDBFE" stroke-width="1"/>
  <!-- content -->
  <text x="597" y="115" text-anchor="middle" font-size="11.5" fill="#78716C">ContactManagerComposer</text>
  <text x="597" y="134" text-anchor="middle" font-size="11.5" fill="#78716C">index.zul</text>
  <!-- badge -->
  <rect x="491" y="155" width="212" height="22" rx="11" fill="#BFDBFE"/>
  <text x="597" y="169" text-anchor="middle" font-size="10" fill="#1D4ED8" font-weight="600">✦  Written in Java · Zero JS</text>

  <!-- Arrow R: Pres → Domain -->
  <line x1="597" y1="208" x2="597" y2="250" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════
       RIGHT: DOMAIN BOX
  ═══════════════════════════════════════════════════════ -->
  <rect x="455" y="254" width="266" height="82" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="597" y="275" text-anchor="middle" font-size="11.5" font-weight="700" fill="#16A34A" letter-spacing="1">DOMAIN</text>
  <line x1="465" y1="283" x2="711" y2="283" stroke="#BBF7D0" stroke-width="1"/>
  <text x="597" y="303" text-anchor="middle" font-size="11.5" fill="#78716C">Contact, Category</text>
  <text x="597" y="321" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="600">✓  Preserved intact</text>

  <!-- Arrow R: Domain → Data Source -->
  <line x1="597" y1="336" x2="597" y2="378" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════
       RIGHT: DATA SOURCE BOX
  ═══════════════════════════════════════════════════════ -->
  <rect x="447" y="382" width="282" height="82" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="597" y="403" text-anchor="middle" font-size="11.5" font-weight="700" fill="#16A34A" letter-spacing="1">DATA SOURCE</text>
  <line x1="457" y1="411" x2="719" y2="411" stroke="#BBF7D0" stroke-width="1"/>
  <text x="597" y="430" text-anchor="middle" font-size="11.5" fill="#78716C">ContactStore @Service</text>
  <text x="597" y="448" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="600">✓  Preserved intact</text>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <rect x="183" y="510" width="414" height="14" fill="none"/>
  <!-- red swatch -->
  <rect x="188" y="510" width="13" height="13" rx="3" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="207" y="521" font-size="11" fill="#94A3B8">Presentation layer replaced</text>
  <!-- blue swatch -->
  <rect x="360" y="510" width="13" height="13" rx="3" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="379" y="521" font-size="11" fill="#94A3B8">ZK replacement</text>
  <!-- green swatch -->
  <rect x="476" y="510" width="13" height="13" rx="3" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="495" y="521" font-size="11" fill="#94A3B8">Domain + Data preserved</text>
</svg>
